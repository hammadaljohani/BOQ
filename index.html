<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض سعر مقاول – تجديد شقة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EE;
    --card: #FFFFFF;
    --primary: #1A2E1A;
    --accent: #C8A96E;
    --text: #1C1C1C;
    --muted: #7A7065;
    --border: #E0D9D0;
    --input-bg: #FAF8F5;
    --phase2: #2A1F3D;
    --error: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; direction: rtl; }
  .hero { background: var(--primary); padding: 36px 24px 28px; position: relative; overflow: hidden; text-align: right; }
  .hero::before { content: ''; position: absolute; top: -40px; left: -40px; width: 180px; height: 180px; border-radius: 50%; background: rgba(200,169,110,0.12); }
  .hero-label { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
  .hero h1 { font-size: 26px; font-weight: 700; color: #fff; line-height: 1.4; margin-bottom: 10px; }
  .hero p { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.8; }
  .info-card { background: var(--card); margin: 20px 16px 0; border-radius: 14px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .info-card h2 { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .field-group { margin-bottom: 14px; }
  .field-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
  .field-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--input-bg); font-family: 'Tajawal', sans-serif; font-size: 15px; color: var(--text); text-align: right; direction: rtl; transition: border-color 0.2s; -webkit-appearance: none; }​​​​​​​​​​​​​​​​
